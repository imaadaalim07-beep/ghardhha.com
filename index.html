<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOT YOUR AVERAGE SENIORS</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Full Website Background Layer */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.65; 
            z-index: -1;
        }

        /* Main Container with custom background under the buttons */
        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 40px 24px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Dynamic Image Layer Underneath the Buttons */
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('container-bg.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.85; 
            z-index: -1;
        }

        /* Dark tint layer to ensure text remains readable over your image */
        .container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }

        /* Profile Layout & Custom PNG Icon Styling */
        .profile .avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: block;
            position: relative;
            z-index: 1;
        }

        /* Steady Bold Header Font Styling */
        .profile h1 {
            font-family: 'Anton', sans-serif; /* Applied heavy, steady bold font */
            font-size: 34px; /* Scaled up nicely for the new block style */
            font-weight: 400;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
        }

        .profile p {
            font-size: 14px;
            color: #f0f0f0;
            margin-bottom: 35px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 1;
        }

        /* Buttons Configuration */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        /* Liquid Glass Buttons */
        .link-btn {
            display: block;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.05) 100%);
            color: #ffffff;
            padding: 16px 20px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 16px;
            
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.25);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 
                        0 8px 20px rgba(0, 0, 0, 0.3);
            
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Hover & Fluid Interaction Visuals */
        .link-btn:hover {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            transform: translateY(-3px) scale(1.02);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.4), 
                        0 12px 24px rgba(0, 0, 0, 0.5);
        }

        .link-btn:active {
            transform: translateY(-1px) scale(1);
        }

        /* Footer Styling */
        view-footer {
            margin-top: 35px;
            font-size: 11px;
            color: #cccccc;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <header class="profile">
            <img src="icon.jpg" class="avatar-img" alt="Icon">
            <h1>NOT YOUR AVERAGE SENIORS</h1>
            <p>YOU BETTER DON'T CLICK THIS</p>
        </header>

        <main class="links-container">
            <a href="https://instagram.com/ghardhha" target="_blank" class="link-btn">@ghardhha</a>
            <a href="https://instagram.com/ccoremm" target="_blank" class="link-btn">@ccoremm</a>
            <a href="https://instagram.com/one.sssssh._" target="_blank" class="link-btn">@one.sssssh._</a>
            <a href="https://instagram.com/core.thngs" target="_blank" class="link-btn">@core.thngs</a>
            <a href="https://instagram.com/about.c2" target="_blank" class="link-btn">@about.c2</a>
        </main>

        <footer>
            <p>© 2026 Connected</p>
        </footer>
    </div>

</body>
</html>

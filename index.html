<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOT YOUR AVERAGE SENIORS</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; /* Pure black base under the image */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Photo Layer with Higher Opacity */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg'); /* Change to background.png if your bg is a PNG */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.65; /* Increased opacity to make the photo pop more */
            z-index: -1;
        }

        /* Glassmorphism Main Container */
        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
            background: rgba(0, 0, 0, 0.55); /* Darkened slightly to contrast better with brighter bg */
            padding: 40px 24px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px); /* Enhanced blur for better text readability */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Profile Layout & Custom PNG Icon Styling */
        .profile .avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: block;
        }

        .profile h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .profile p {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 35px;
        }

        /* Buttons Configuration */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Glassmorphism Buttons */
        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 16px 20px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Hover & Tap Visuals */
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        /* Footer Styling */
        footer {
            margin-top: 35px;
            font-size: 11px;
            color: #aaaaaa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <header class="profile">
            <img src="icon.jpg" class="avatar-img" alt="Icon">
            <h1>NOT YOUR AVERAGE SENIORS</h1>
            <p>YOU BETTER DON'T CLICK THIS</p>
        </header>

        <main class="links-container">
            <a href="https://instagram.com/ghardhha" target="_blank" class="link-btn">@ghardhha</a>
            <a href="https://instagram.com/ccoremm" target="_blank" class="link-btn">@ccoremm</a>
            <a href="https://instagram.com/one.sssssh._" target="_blank" class="link-btn">@one.sssssh._</a>
            <a href="https://instagram.com/core.thngs" target="_blank" class="link-btn">@core.thngs</a>
            <a href="https://instagram.com/about.c2" target="_blank" class="link-btn">@about.c2</a>
        </main>

        <footer>
            <p>© 2026 Connected</p>
        </footer>
    </div>

</body>
</html>
